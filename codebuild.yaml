version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20

  build:
    commands:
      - echo "Entering frontend"
      - cd frontend

      - echo "Installing dependencies"
      - npm install

      - echo "Building MailCrafter"
      - npm run build

      - echo "Uploading build to S3"
      - aws s3 sync dist/ s3://clouddeploy-pro-hosting --delete

artifacts:
  files:
    - '**/*'